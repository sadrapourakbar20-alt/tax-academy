<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tax Academy</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:#0f172a;
color:white;
}

header{
background:#1e293b;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
color:#38bdf8;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
}

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h2{
font-size:50px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
color:#cbd5e1;
max-width:700px;
line-height:2;
}

.btn{
margin-top:35px;
padding:15px 35px;
background:#38bdf8;
color:#000;
font-size:20px;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

.section{
padding:80px 20px;
text-align:center;
}

.cards{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:40px;
}

.card{
width:300px;
background:#1e293b;
padding:30px;
border-radius:15px;
}

footer{
background:#1e293b;
padding:25px;
text-align:center;
margin-top:60px;
}
</style>

</head>

<body>

<header>

<h1>Tax Academy</h1>

<nav>
<a href="#">خانه</a>
<a href="#">دوره‌ها</a>
<a href="#">اساتید</a>
<a href="#">ورود</a>
</nav>

</header>

<section class="hero">

<h2>به آکادمی مالیاتی خوش آمدید</h2>

<p>
یادگیری مالیات، حسابداری و ثبت شرکت به صورت کاملاً کاربردی
</p>

<a class="btn" href="#">شروع آموزش</a>

</section>

<section class="section">

<h2>دوره‌های آموزشی</h2>

<div class="cards">

<div class="card">
<h3>مالیات</h3>
<p>آموزش صفر تا صد مالیات</p>
</div>

<div class="card">
<h3>حسابداری</h3>
<p>آموزش کاربردی حسابداری</p>
</div>

<div class="card">
<h3>ثبت شرکت</h3>
<p>آموزش کامل ثبت شرکت‌ها</p>
</div>

</div>

</section>

<footer>

© 2026 Tax Academy

</footer>

</body>
</html>
